name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 pkg-config gcc \
            libcurl4-openssl-dev libevent-dev

      - name: Configure
        run: python3 waf configure --disable-man --no-werror

      - name: Build
        run: python3 waf build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: saldl-linux-x86_64
          path: build/saldl

  build-linux-static:
    runs-on: ubuntu-latest
    container: alpine:latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          apk add --no-cache python3 pkgconf gcc musl-dev git \
            curl-dev curl-static libevent-dev libevent-static \
            openssl-dev openssl-libs-static nghttp2-dev nghttp2-static \
            zlib-dev zlib-static brotli-dev brotli-static \
            c-ares-dev \
            libidn2-dev libidn2-static libunistring-dev libunistring-static \
            zstd-dev zstd-static libpsl-dev libpsl-static \
            nghttp3-static

      - name: Mark git directory safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Configure
        run: |
          export LINKFLAGS_SAL="-static"
          python3 waf configure --disable-man --no-werror --enable-static --enable-link-optimizations

      - name: Build
        run: python3 waf build

      - name: Verify static binary
        run: ls -lh build/saldl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: saldl-linux-x86_64-static
          path: build/saldl

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: brew install pkg-config curl libevent

      - name: Configure
        run: |
          export PKG_CONFIG_PATH="$(brew --prefix curl)/lib/pkgconfig:$(brew --prefix libevent)/lib/pkgconfig:$PKG_CONFIG_PATH"
          python3 waf configure --disable-man --no-werror

      - name: Build
        run: python3 waf build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: saldl-macos-arm64
          path: build/saldl

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-pkg-config
            mingw-w64-ucrt-x86_64-curl
            mingw-w64-ucrt-x86_64-libevent
            python3

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure
        run: |
          export CC=gcc
          python3 waf configure --disable-man --no-werror \
            --libevent-pthreads-cflags "$(pkg-config --cflags libevent)" \
            --libevent-pthreads-libs "$(pkg-config --libs libevent)"

      - name: Build
        run: python3 waf build

      - name: Collect DLLs and CA certs
        run: |
          mkdir -p dist/etc/ssl/certs
          cp build/saldl.exe dist/
          ldd build/saldl.exe | grep ucrt64 | awk '{print $3}' | xargs -I{} cp {} dist/
          cp /ucrt64/etc/ssl/certs/ca-bundle.crt dist/etc/ssl/certs/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: saldl-windows-x86_64
          path: dist/
