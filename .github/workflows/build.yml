name: Build

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 pkg-config gcc \
            libcurl4-openssl-dev libevent-dev

      - name: Configure
        run: python3 waf configure --disable-man --no-werror

      - name: Build
        run: python3 waf build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: infidl-linux-x86_64
          path: build/infidl

  build-linux-static:
    runs-on: ubuntu-latest
    container: alpine:latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          apk add --no-cache python3 pkgconf gcc musl-dev git \
            curl-dev curl-static libevent-dev libevent-static \
            openssl-dev openssl-libs-static nghttp2-dev nghttp2-static \
            zlib-dev zlib-static brotli-dev brotli-static \
            c-ares-dev \
            libidn2-dev libidn2-static libunistring-dev libunistring-static \
            zstd-dev zstd-static libpsl-dev libpsl-static \
            nghttp3-static

      - name: Mark git directory safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Configure
        run: |
          export LINKFLAGS_SAL="-static"
          python3 waf configure --disable-man --no-werror --enable-static --enable-link-optimizations

      - name: Build
        run: python3 waf build

      - name: Verify static binary
        run: ls -lh build/infidl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: infidl-linux-x86_64-static
          path: build/infidl

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: brew install pkg-config curl libevent

      - name: Configure
        run: |
          export PKG_CONFIG_PATH="$(brew --prefix curl)/lib/pkgconfig:$(brew --prefix libevent)/lib/pkgconfig:$PKG_CONFIG_PATH"
          python3 waf configure --disable-man --no-werror

      - name: Build
        run: python3 waf build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: infidl-macos-arm64
          path: build/infidl

  build-windows-static:
    runs-on: ubuntu-latest
    env:
      HOST: x86_64-w64-mingw32
      PREFIX: /tmp/win-deps
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 python3 pkg-config

      - name: Build zlib
        run: |
          curl -sL https://github.com/madler/zlib/releases/download/v1.3.1/zlib-1.3.1.tar.gz | tar xz
          cd zlib-1.3.1
          CC=${HOST}-gcc AR=${HOST}-ar RANLIB=${HOST}-ranlib \
            ./configure --static --prefix=${PREFIX}
          make -j$(nproc)
          make install

      - name: Build libevent
        run: |
          curl -sL https://github.com/libevent/libevent/releases/download/release-2.1.12-stable/libevent-2.1.12-stable.tar.gz | tar xz
          cd libevent-2.1.12-stable
          ./configure --host=${HOST} --prefix=${PREFIX} \
            --disable-shared --enable-static \
            --disable-samples --disable-libevent-regress \
            --disable-openssl \
            CFLAGS="-I${PREFIX}/include" LDFLAGS="-L${PREFIX}/lib"
          make -j$(nproc)
          make install

      - name: Build libcurl
        run: |
          curl -sL https://curl.se/download/curl-8.12.1.tar.gz | tar xz
          cd curl-8.12.1
          ./configure --host=${HOST} --prefix=${PREFIX} \
            --disable-shared --enable-static \
            --with-schannel --with-zlib=${PREFIX} \
            --without-openssl --without-gnutls --without-wolfssl \
            --without-mbedtls --without-bearssl --without-rustls \
            --disable-ldap --disable-ldaps --disable-rtsp \
            --disable-dict --disable-telnet --disable-tftp \
            --disable-pop3 --disable-imap --disable-smb \
            --disable-smtp --disable-gopher --disable-mqtt \
            --disable-manual --disable-docs \
            --without-libpsl --without-brotli --without-zstd \
            --without-libidn2 --without-libssh2 --without-nghttp2 \
            CFLAGS="-I${PREFIX}/include" LDFLAGS="-L${PREFIX}/lib" \
            LIBS="-lws2_32 -lcrypt32"
          make -j$(nproc)
          make install

      - name: Configure infidl
        run: |
          export CC=${HOST}-gcc
          export LINKFLAGS_SAL="-L${PREFIX}/lib -static"
          python3 waf configure --disable-man --no-werror --enable-static \
            --enable-link-optimizations \
            --infidl-version="$(git describe --tags --long --dirty 2>/dev/null || echo '2.0')" \
            --libcurl-cflags "-I${PREFIX}/include -DCURL_STATICLIB" \
            --libcurl-libs "-L${PREFIX}/lib -lcurl -lz -lws2_32 -lcrypt32 -lbcrypt -ladvapi32 -liphlpapi" \
            --libevent-pthreads-cflags "-I${PREFIX}/include" \
            --libevent-pthreads-libs "-L${PREFIX}/lib -levent -levent_core"

      - name: Build infidl
        run: python3 waf build -v

      - name: Verify
        run: |
          file build/infidl.exe
          ${HOST}-objdump -p build/infidl.exe | grep "DLL Name" || echo "No DLL imports - fully static"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: infidl-windows-x86_64
          path: build/infidl.exe
